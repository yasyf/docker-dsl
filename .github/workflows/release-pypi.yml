name: Release (PyPI)

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-pypi
  cancel-in-progress: false

jobs:
  build:
    uses: yasyf/homebrew-tap/.github/workflows/release-pypi-build.yml@pypi-v1
    secrets: inherit
    with:
      dist-name: docker-dsl
      python-version: "3.14"

  # PyPI Trusted Publishing must run in THIS repo's workflow — it authenticates via the OIDC
  # job_workflow_ref claim, which inside a reusable workflow points at homebrew-tap, not here
  # (and PyPI does not support reusable workflows for Trusted Publishing). Running publish here
  # makes job_workflow_ref this repo's release-pypi.yml, matching the existing trusted publisher.
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dist*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dist*
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
        run: >
          gh release create "$TAG"
          --title "$TAG"
          --generate-notes
          --latest
          --repo "${{ github.repository }}"
          dist/*
